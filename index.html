<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamu Sports Hub</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0B1B2D;
    color: white;
}

nav {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: #111;
}

button {
    padding: 8px 12px;
    cursor: pointer;
}

.section {
    display: none;
    padding: 20px;
}

.section.active {
    display: block;
}

.card {
    background: #1c2b3a;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

input {
    padding: 6px;
    margin: 5px;
}
</style>
</head>

<body>

<nav>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('teams')">Teams</button>
    <button onclick="showSection('players')">Players</button>
    <button onclick="showSection('matches')">Matches</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <h2>Dashboard</h2>
    <div id="stats"></div>
</div>

<!-- TEAMS -->
<div id="teams" class="section">
    <h2>Teams</h2>

    <input id="teamName" placeholder="Team name">
    <button onclick="addTeam()">Add Team</button>

    <div id="teamsList"></div>
</div>

<!-- PLAYERS -->
<div id="players" class="section">
    <h2>Players</h2>

    <input id="playerName" placeholder="Player name">
    <input id="playerTeam" placeholder="Team ID">
    <button onclick="addPlayer()">Add Player</button>

    <div id="playersList"></div>
</div>

<!-- MATCHES -->
<div id="matches" class="section">
    <h2>Matches</h2>

    <input id="homeTeam" placeholder="Home Team ID">
    <input id="awayTeam" placeholder="Away Team ID">
    <button onclick="addMatch()">Create Match</button>

    <div id="matchesList"></div>
</div>

<script>
const DataStore = {
    init() {
        if (!localStorage.getItem("lamu_data")) {
            localStorage.setItem("lamu_data", JSON.stringify({
                teams: [],
                players: [],
                matches: []
            }));
        }
    },

    get() {
        return JSON.parse(localStorage.getItem("lamu_data"));
    },

    save(data) {
        localStorage.setItem("lamu_data", JSON.stringify(data));
    }
};

/* NAVIGATION */
function showSection(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* RENDER */
function renderAll() {
    renderStats();
    renderTeams();
    renderPlayers();
    renderMatches();
}

function renderStats() {
    const data = DataStore.get();
    document.getElementById("stats").innerHTML = `
        <div class="card">Teams: ${data.teams.length}</div>
        <div class="card">Players: ${data.players.length}</div>
        <div class="card">Matches: ${data.matches.length}</div>
    `;
}

function renderTeams() {
    const teams = DataStore.get().teams;
    document.getElementById("teamsList").innerHTML = teams.map(t => `
        <div class="card">
            ID: ${t.id} | ${t.name}
        </div>
    `).join("");
}

function renderPlayers() {
    const data = DataStore.get();
    document.getElementById("playersList").innerHTML = data.players.map(p => {
        const team = data.teams.find(t => t.id == p.teamId);
        return `
            <div class="card">
                ${p.name} (${team ? team.name : "No Team"})
            </div>
        `;
    }).join("");
}

function renderMatches() {
    const data = DataStore.get();
    document.getElementById("matchesList").innerHTML = data.matches.map(m => {
        const home = data.teams.find(t => t.id == m.home);
        const away = data.teams.find(t => t.id == m.away);
        return `
            <div class="card">
                ${home?.name || "?"} vs ${away?.name || "?"}<br>
                Score: ${m.score}<br>
                Status: ${m.status}
                <br><br>
                <button onclick="startMatch(${m.id})">Start</button>
                <button onclick="goal(${m.id}, 'home')">Goal Home</button>
                <button onclick="goal(${m.id}, 'away')">Goal Away</button>
                <button onclick="finishMatch(${m.id})">Finish</button>
            </div>
        `;
    }).join("");
}

/* ACTIONS */
function addTeam() {
    const name = document.getElementById("teamName").value;
    if (!name) return;

    const data = DataStore.get();
    data.teams.push({ id: Date.now(), name });
    DataStore.save(data);

    renderAll();
}

function addPlayer() {
    const name = document.getElementById("playerName").value;
    const teamId = document.getElementById("playerTeam").value;

    const data = DataStore.get();
    data.players.push({ id: Date.now(), name, teamId });

    DataStore.save(data);
    renderAll();
}

function addMatch() {
    const home = document.getElementById("homeTeam").value;
    const away = document.getElementById("awayTeam").value;

    const data = DataStore.get();
    data.matches.push({
        id: Date.now(),
        home,
        away,
        score: "0-0",
        status: "upcoming"
    });

    DataStore.save(data);
    renderAll();
}

function startMatch(id) {
    const data = DataStore.get();
    const match = data.matches.find(m => m.id == id);
    match.status = "live";
    DataStore.save(data);
    renderAll();
}

function goal(id, team) {
    const data = DataStore.get();
    const match = data.matches.find(m => m.id == id);

    let [h, a] = match.score.split("-").map(Number);

    if (team === "home") h++;
    else a++;

    match.score = h + "-" + a;

    DataStore.save(data);
    renderAll();
}

function finishMatch(id) {
    const data = DataStore.get();
    const match = data.matches.find(m => m.id == id);
    match.status = "finished";

    DataStore.save(data);
    renderAll();
}

/* INIT */
document.addEventListener("DOMContentLoaded", () => {
    DataStore.init();
    renderAll();
});
</script>

</body>
</html>
