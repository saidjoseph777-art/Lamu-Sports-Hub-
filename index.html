<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamu Sports Hub - Complete Football Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ocean-deep: #0B1B2D;
            --coral-orange: #FF6B4A;
            --sand-beige: #F5E6D3;
            --lagoon-teal: #2A9D8F;
            --sunset-gold: #E9C46A;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ocean-deep);
            color: #fff;
            min-height: 100vh;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            background: rgba(11, 27, 45, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--coral-orange), var(--sunset-gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: #9CA3AF;
            margin-top: -2px;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            color: #D1D5DB;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover {
            color: var(--coral-orange);
            background: rgba(255, 107, 74, 0.1);
        }

        .nav-btn.active {
            background: rgba(255, 107, 74, 0.2);
            color: var(--coral-orange);
            border-left: 3px solid var(--coral-orange);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .notification-btn {
            position: relative;
            background: none;
            border: none;
            color: #9CA3AF;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.3s;
        }

        .notification-btn:hover {
            color: white;
        }

        .notification-dot {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            width: 8px;
            height: 8px;
            background: #EF4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .user-menu {
            position: relative;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--lagoon-teal), #3B82F6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .user-avatar:hover {
            transform: scale(1.1);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(11, 27, 45, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 0.5rem;
            min-width: 200px;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Content */
        main {
            padding-top: 90px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
            padding-bottom: 3rem;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--coral-orange), var(--sunset-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            opacity: 0.1;
            transform: translate(30%, -30%);
        }

        .stat-card:nth-child(1)::before { background: var(--coral-orange); }
        .stat-card:nth-child(2)::before { background: var(--lagoon-teal); }
        .stat-card:nth-child(3)::before { background: var(--sunset-gold); }
        .stat-card:nth-child(4)::before { background: #3B82F6; }

        .stat-label {
            font-size: 0.875rem;
            color: #9CA3AF;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-change {
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .text-green { color: #10B981; }
        .text-orange { color: var(--coral-orange); }
        .text-red { color: #EF4444; }

        /* Live Match Banner */
        .live-banner {
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 107, 74, 0.1), rgba(11, 27, 45, 0.8));
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #EF4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .live-text {
            color: #EF4444;
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }

        .match-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .team-display {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .team-display:hover .team-logo {
            transform: scale(1.1);
        }

        .team-name {
            font-weight: 600;
            font-size: 1.125rem;
        }

        .score-display {
            text-align: center;
            padding: 0 2rem;
        }

        .score {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--coral-orange), var(--sunset-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .match-time {
            color: #9CA3AF;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .match-controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-btn.primary {
            background: var(--coral-orange);
            color: white;
        }

        .control-btn.primary:hover {
            background: #FF5722;
            transform: scale(1.05);
        }

        .control-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .control-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .control-btn.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        .control-btn.danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .view-all {
            color: var(--coral-orange);
            font-size: 0.875rem;
            text-decoration: none;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        .view-all:hover {
            opacity: 0.8;
        }

        /* Fixture List */
        .fixture-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .fixture-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .fixture-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .fixture-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .fixture-time {
            text-align: center;
            min-width: 60px;
        }

        .fixture-date {
            font-size: 0.75rem;
            color: #9CA3AF;
            text-transform: uppercase;
        }

        .fixture-hour {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--coral-orange);
        }

        .fixture-divider {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
        }

        .fixture-teams {
            font-weight: 500;
        }

        .fixture-venue {
            font-size: 0.875rem;
            color: #9CA3AF;
            margin-top: 0.25rem;
        }

        .fixture-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-league { background: rgba(234, 179, 8, 0.2); color: #EAB308; }
        .badge-youth { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
        .badge-friendly { background: rgba(168, 85, 247, 0.2); color: #A78BFA; }

        /* News/Community Panel */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .news-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.75rem;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .news-item.highlight {
            background: linear-gradient(135deg, rgba(255, 107, 74, 0.1), transparent);
            border-left-color: var(--coral-orange);
        }

        .news-header {
            display: flex;
            align-items: start;
            gap: 0.75rem;
        }

        .news-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.875rem;
        }

        .news-content p {
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.5;
        }

        .news-content span {
            font-size: 0.75rem;
            color: #9CA3AF;
            display: block;
            margin-top: 0.25rem;
        }

        .news-actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.75rem;
            padding-left: 2.5rem;
        }

        .news-action {
            font-size: 0.75rem;
            color: #9CA3AF;
            cursor: pointer;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .news-action:hover {
            color: var(--coral-orange);
        }

        .community-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
        }

        .community-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Sections */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .section-title p {
            color: #9CA3AF;
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--coral-orange), #FF8E53);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 74, 0.4);
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .filter-tab {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: #D1D5DB;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .filter-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-tab.active {
            background: var(--coral-orange);
            color: white;
        }

        /* Teams Grid */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .team-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 107, 74, 0.15);
            border-color: rgba(255, 107, 74, 0.3);
        }

        .team-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .team-card:hover .team-actions {
            opacity: 1;
        }

        .team-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .team-action-btn:hover {
            background: var(--coral-orange);
        }

        .team-banner {
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 107, 74, 0.3), rgba(42, 157, 143, 0.3));
            position: relative;
        }
                    <div class="form-group">
                        <label class="form-label">League/Competition</label>
                        <select class="form-select" id="matchLeague" required>
                            <option value="Premier Division">Premier Division</option>
                            <option value="Women's League">Women's League</option>
                            <option value="Youth League">Youth League</option>
                            <option value="Governor's Cup">Governor's Cup</option>
                            <option value="Community Shield">Community Shield</option>
                            <option value="Friendly">Friendly</option>
                        </select>
                    </div>

                    <div class="form-group" id="matchStatusGroup" style="display: none;">
                        <label class="form-label">Match Status</label>
                        <select class="form-select" id="matchStatus">
                            <option value="upcoming">Upcoming</option>
                            <option value="live">Live</option>
                            <option value="finished">Finished</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-full btn-primary">
                        <i class="fas fa-save"></i> Save Match
                    </button>
                    <button type="button" class="btn-full btn-danger" id="deleteMatchBtn" onclick="deleteMatch()" style="display: none;">
                        <i class="fas fa-trash"></i> Delete Match
                    </button>
                    <button type="button" class="btn-full btn-secondary" id="startMatchBtn" onclick="startMatchFromModal()" style="display: none;">
                        <i class="fas fa-play"></i> Start Match Now
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Post Modal -->
    <div class="modal-overlay" id="postModal" onclick="closeModal(event, 'postModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(null, 'postModal')">
                <i class="fas fa-times"></i>
            </button>
            
            <div class="modal-header">
                <div class="modal-icon" style="background: linear-gradient(135deg, #3B82F6, #8B5CF6);">
                    <i class="fas fa-pen"></i>
                </div>
                <h2>Post Update</h2>
                <p style="color: #9CA3AF; margin-top: 0.5rem;">Share news with the community</p>
            </div>
            
            <div class="modal-body">
                <form id="postForm" onsubmit="savePost(event)">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-input" id="postTitle" required placeholder="What's happening?">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Content</label>
                        <textarea class="form-input" id="postContent" rows="4" placeholder="Share details..." style="resize: vertical;"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="postCategory">
                            <option value="match">Match Result</option>
                            <option value="transfer">Transfer News</option>
                            <option value="general">General</option>
                            <option value="announcement">Announcement</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-full btn-primary">
                        <i class="fas fa-paper-plane"></i> Post Update
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==========================================
        // DATA STORE (Simulated Backend)
        // ==========================================
        
        const DataStore = {
            // Initialize with default data if empty
            init() {
                if (!localStorage.getItem('lamu_sports_data')) {
                    const defaultData = {
                        teams: [
                            { id: 1, name: 'Lamu FC', category: 'premier', icon: 'fa-anchor', color: '#2A9D8F', founded: 1998, stadium: 'Lamu Sports Ground', capacity: '8,000', coach: 'Ahmed Hassan', players: 24, wins: 12, draws: 3, losses: 2, gf: 35, ga: 12, points: 39 },
                            { id: 2, name: '11 Brothers', category: 'premier', icon: 'fa-shield-alt', color: '#3B82F6', founded: 2005, stadium: 'Mkunumbi Stadium', capacity: '5,000', coach: 'James Omondi', players: 22, wins: 10, draws: 4, losses: 3, gf: 28, ga: 15, points: 34 },
                            { id: 3, name: 'Blue Rangers', category: 'premier', icon: 'fa-water', color: '#10B981', founded: 2012, stadium: 'Kibaki Grounds', capacity: '3,000', coach: 'Ali Mohamed', players: 20, wins: 9, draws: 5, losses: 3, gf: 25, ga: 18, points: 32 },

        function renderStats() {
            const teams = DataStore.getCollection('teams');
            const players = DataStore.getCollection('players');
            const matches = DataStore.getCollection('matches');
            const finishedMatches = matches.filter(m => m.status === 'finished');
            
            // Calculate total goals
            const totalGoals = finishedMatches.reduce((sum, m) => sum + m.homeScore + m.awayScore, 0);

            const stats = [
                { label: 'Active Teams', value: teams.length, change: '+2 this season', icon: 'fa-users', color: 'text-green' },
                { label: 'Registered Players', value: players.length, change: '+12 this month', icon: 'fa-user', color: 'text-green' },
                { label: 'Matches Played', value: finishedMatches.length, change: 'This season', icon: 'fa-futbol', color: 'text-orange' },
                { label: 'Goals Scored', value: totalGoals, change: `${(totalGoals / (finishedMatches.length || 1)).toFixed(1)} avg/match`, icon: 'fa-bullseye', color: 'text-orange' }
            ];

            const container = document.getElementById('statsGrid');
            container.innerHTML = stats.map(stat => `
                <div class="glass-panel stat-card">
                    <div class="stat-label">${stat.label}</div>
                    <div class="stat-value ${stat.label === 'Active Teams' || stat.label === 'Goals Scored' ? 'gradient-text' : ''}">${stat.value}</div>
                    <div class="stat-change ${stat.color}">
                        <i class="fas ${stat.icon}"></i> ${stat.change}
                    </div>
                </div>
            `).join('');
        }

        function renderFixtures() {
            const matches = DataStore.getCollection('matches');
            const teams = DataStore.getCollection('teams');
            const upcoming = matches.filter(m => m.status === 'upcoming').slice(0, 5);

            const container = document.getElementById('fixtureList');
            if (upcoming.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar"></i><p>No upcoming fixtures</p></div>';
                return;
            }

            container.innerHTML = upcoming.map(match => {
                const homeTeam = teams.find(t => t.id === match.homeTeamId);
                const awayTeam = teams.find(t => t.id === match.awayTeamId);
                const date = new Date(match.date);
                const today = new Date();
                const isToday = date.toDateString() === today.toDateString();
                const dateStr = isToday ? 'TODAY' : date.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();

                return `
                    <div class="fixture-item" onclick="viewMatchDetails(${match.id})">
                        <div class="fixture-info">

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (confirm('This will overwrite all current data. Continue?')) {
                            DataStore.save(data);
                            renderAll();
                            showToast('Data imported successfully!', 'success');
                        }
                    } catch (err) {
                        showToast('Invalid file format', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function getTeamName(teamId) {
            const team = DataStore.getCollection('teams').find(t => t.id === teamId);
            return team ? team.name : 'Unknown';
        }

        function generateForm(team) {
            // Generate realistic form based on recent results
            const forms = ['W', 'W', 'D', 'L', 'W'];
            const weights = team.points / (team.wins + team.draws + team.losses || 1);
            
            // Better teams have more wins in form
            const form = [];
            for (let i = 0; i < 5; i++) {
                const rand = Math.random();
                if (rand < 0.5 * (weights / 3)) form.push('W');
                else if (rand < 0.8) form.push('D');
                else form.push('L');
            }
            return form;
        }

        function formatTime(timestamp) {
            if (!timestamp) return 'Just now';
            
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
            
            return date.toLocaleDateString();
        }

        function checkScheduledMatches() {
            const matches = DataStore.getCollection('matches');
            const now = new Date();
            
            matches.forEach(match => {
                if (match.status === 'upcoming') {
                    const matchDate = new Date(`${match.date}T${match.time}`);
                    const diff = (now - matchDate) / 1000 / 60; // minutes
                    
                    // Auto-start if it's time (within 5 minutes)
                    if (diff >= -5 && diff < 10) {
                        // Could auto-start here, or just notify
                        if (Math.random() > 0.7) { // 30% chance to suggest start
                            addNotification({
                                title: 'Match Ready to Start',
                                message: `${getTeamName(match.homeTeamId)} vs ${getTeamName(match.awayTeamId)} is scheduled now`,
                                icon: 'fa-clock',
                                color: 'rgba(234, 179, 8, 0.2)',
                                iconColor: '#EAB308'
                            });
                        }
                    }
                }
            });
        }

        function exportStandings() {
            const teams = DataStore.getCollection('teams').sort((a, b) => b.points - a.points);
            let csv = 'Position,Team,Played,Won,Drawn,Lost,GF,GA,GD,Points\n';
            
            teams.forEach((team, index) => {
                const gd = team.gf - team.ga;
                const played = team.wins + team.draws + team.losses;
                csv += `${index + 1},${team.name},${played},${team.wins},${team.draws},${team.losses},${team.gf},${team.ga},${gd},${team.points}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `standings-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            
            showToast('Standings exported to CSV!', 'success');
        }

        // ==========================================
        // ADDITIONAL FEATURES
        // ==========================================
        
        // Simulate some random activity for demo purposes
        setTimeout(() => {
            // Add a welcome notification
            addNotification({
                title: 'Welcome to Lamu Sports Hub',
                message: 'System initialized and ready. All features are operational.',
                icon: 'fa-check-circle',
                color: 'rgba(16, 185, 129, 0.2)',
                iconColor: '#10B981'
            });
        }, 1000);

        // Expose functions for console debugging
        window.LamuSports = {
            DataStore,
            State,
            renderAll,
            addNotification,
            showToast
        };
    </script>
